version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    env_file:
      - .env
    depends_on:
      - db
      - vector-db

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app/backend
      - ./data:/data
    env_file:
      - .env
    depends_on:
      - db
      - vector-db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  vector-db:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

volumes:
  postgres_data:
